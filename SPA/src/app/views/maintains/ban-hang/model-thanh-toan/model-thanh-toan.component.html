
<div bsModal #modalAdd="bs-modal" class="modal fade"  tabindex="-1"
role="dialog" aria-labelledby="dialog-child-name1">
<div class="modal-dialog modal-dialog-centered"  role="document">
<div class="modal-content ">
<!-- Header -->
 <div class="modal-header bg-primary">
  <h5 class="modal-title" id="modal-basic-title">Thanh toán</h5>
   <button type="button" class="btn-close close pull-right" aria-label="Close" (click)="modalAdd.hide()">
       <span aria-hidden="true" class="visually-hidden">&times;</span>
   </button>
 </div>
<!-- Body -->
 <div class="modal-body ">
   <form class="form-horizontal " #AddForm="ngForm" autocomplete="off">
       <div class="form-group row p-2">
            <label for="chuyenKhoan" class="col-sm-4 col-form-label  lb form-group required control-label">Tiền chuyển khoản</label>
             <div class="col-sm-8">
              <input type="number" [(ngModel)]="data.chuyenKhoan"  name="chuyenKhoan" class="form-control" id="chuyenKhoan" step="any" />
            </div>
            <label for="tienMat" class="col-sm-4 col-form-label  lb form-group required control-label">Tiền mặt</label>
            <div class="col-sm-8">
              <input type="number" [(ngModel)]="data.tienMat"  name="tienMat" class="form-control" id="tienMat" step="any"  />
            </div>
            <label for="tongTien" class="col-sm-4 col-form-label  lb form-group required control-label">Tổng Tiền</label>
            <div class="col-sm-8">
              <input type="text" [(ngModel)]="data.tongTien"  name="tongTien" class="form-control" id="tongTien" readonly/>
            </div> 

       </div>
     </form>
 </div>
<!-- Footer -->
<div class="modal-footer">
  <button type="button" class="btn btn-danger text-white" (click)="cancel()" ><i class="fa fa-ban"></i> Hủy</button>
   <button type="button" class="btn btn-success text-white" (click)="save()" [disabled]="!AddForm.valid"><i class="fa fa-check"></i> Lưu lại</button>
</div>
</div>
</div>
</div>
