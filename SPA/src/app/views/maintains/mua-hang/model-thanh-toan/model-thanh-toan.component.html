<div bsModal
     #modalAdd="bs-modal"
     class="modal fade"
     tabindex="-1"
     role="dialog"
     aria-labelledby="dialog-child-name1">
  <div class="modal-dialog modal-dialog-centered"
       role="document">
    <div class="modal-content">
      <!-- Header -->
      <div class="modal-header">
        <h5 class="modal-title"
            id="modal-basic-title">Thanh toán
        </h5>
        <button type="button"
                class="btn-close close pull-right"
                aria-label="Close"
                (click)="modalAdd.hide()">
          <span aria-hidden="true"
                class="visually-hidden">&times;</span>
        </button>
      </div>
      <!-- Body -->
      <div class="modal-body p-4">
        <form class="form-horizontal"
              #AddForm="ngForm"
              autocomplete="off">
          <div class="alert alert-info text-center mb-4 py-3">
            <p class="mb-1 text-muted text-uppercase fw-bold"
               style="font-size: 0.85rem;">Tổng tiền cần thanh toán</p>
            <h3 class="mb-0 text-primary fw-bold">
              {{ data.tongTien | number:'1.0-0' }} <span class="fs-5">VNĐ</span>
            </h3>
          </div>
          <h6 class="border-bottom pb-2 mb-3 text-uppercase fw-bold"
              style="font-size: 0.85rem;">Chi tiết thanh toán
          </h6>
          <div class="form-group row mb-3 align-items-center">
            <label for="tienMat"
                   class="col-sm-4 col-form-label required font-weight-bold">Tiền mặt</label>
            <div class="col-sm-8">
              <div class="input-group">
                <span class="input-group-text bg-light"><i class="fa fa-money"></i></span>
                <input type="text"
                       [ngModel]="formatCurrency(data.tienMat)"
                       (ngModelChange)="data.tienMat = parseCurrency($event)"
                       name="tienMat"
                       class="form-control fw-bold"
                       id="tienMat"
                       style="text-align: end;"
                       placeholder="0" />
                <span class="input-group-text">VNĐ</span>
              </div>
            </div>
          </div>
          <div class="form-group row mb-3 align-items-center">
            <label for="chuyenKhoan"
                   class="col-sm-4 col-form-label required font-weight-bold">Chuyển khoản</label>
            <div class="col-sm-8">
              <div class="input-group">
                <span class="input-group-text bg-light">
                  <i class="fa fa-university"></i></span>
                <input type="text"
                       [ngModel]="formatCurrency(data.chuyenKhoan)"
                       (ngModelChange)="data.chuyenKhoan = parseCurrency($event)"
                       name="chuyenKhoan"
                       class="form-control fw-bold"
                       id="chuyenKhoan"
                       style="text-align: end;"
                       placeholder="0" />
                <span class="input-group-text">VNĐ</span>
              </div>
            </div>
          </div>
          <div class="p-3 rounded mt-4 border">
            <div class="d-flex justify-content-between align-items-center">
              <span class="font-weight-bold">Tổng thanh toán:</span>
              <span class="font-weight-bold fs-4"
                    [ngClass]="((data.chuyenKhoan || 0) + (data.tienMat || 0)) >= (data.tongTien || 0) ? 'text-success' : 'text-danger'">
                {{ ((data.chuyenKhoan || 0) + (data.tienMat || 0)) | number:'1.0-0' }} VNĐ
              </span>
            </div>
          </div>
          <input type="hidden"
                 [(ngModel)]="data.tongTien"
                 name="tongTien" />
        </form>
      </div>
      <!-- Footer -->
      <div class="modal-footer">
        <button type="button"
                class="btn btn-danger text-white"
                (click)="cancel()"><i class="fa fa-ban"></i>
          Hủy</button>
        <button type="button"
                class="btn btn-success text-white"
                (click)="save()"
                [disabled]="!AddForm.valid"><i class="fa fa-check"></i> Lưu lại</button>
      </div>
    </div>
  </div>
</div>
